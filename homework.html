<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Tracker — Homework</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="homework">
  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">📚</div>
        <div><h1>StudyTracker</h1><span>Productivity System</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="subjects.html" class="nav-item"><span class="nav-icon">📚</span> Subjects</a>
        <a href="homework.html" class="nav-item active"><span class="nav-icon">📝</span> Homework</a>
        <a href="assignments.html" class="nav-item"><span class="nav-icon">📑</span> Assignments</a>
        <a href="tests.html" class="nav-item"><span class="nav-icon">📊</span> Test Analysis</a>
        <a href="study.html" class="nav-item"><span class="nav-icon">🌑</span> Study Mode</a>
      </nav>
      <div class="sidebar-footer">
        <div class="nav-item" onclick="toggleAssistant()"><span class="nav-icon">🤖</span> AI Assistant</div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Main -->
    <main class="main-content">
      <div class="page-wrapper">

        <div class="page-header">
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
            <h1>📝 Homework Log</h1>
          </div>
          <button class="btn btn-primary" onclick="showAddHomeworkModal()">+ Add Homework</button>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
          <select id="filter-hw-subject" class="subject-select" onchange="filterHomework()">
            <option value="">All Subjects</option>
          </select>
          <select id="filter-hw-status" onchange="filterHomework()">
            <option value="">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Done">Done</option>
          </select>
        </div>

        <!-- Table -->
        <div class="card">
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Subject</th>
                  <th>Chapter</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="homework-tbody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Add Homework Modal -->
  <div class="modal-overlay" id="homework-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Homework</h2>
        <div class="modal-close" onclick="closeHomeworkModal()">✕</div>
      </div>
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="hw-title" class="form-input" placeholder="e.g. Solve NCERT Q1-10" />
      </div>
      <div class="form-group">
        <label>Subject *</label>
        <select id="hw-subject" class="form-input subject-select">
          <option value="">Select Subject</option>
        </select>
      </div>
      <div class="form-group">
        <label>Chapter</label>
        <input type="text" id="hw-chapter" class="form-input" placeholder="e.g. Current Electricity" />
      </div>
      <div class="form-group">
        <label>Date Assigned</label>
        <input type="date" id="hw-date" class="form-input" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeHomeworkModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveHomework()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- AI Assistant -->
  <div class="assistant-fab" onclick="toggleAssistant()">🤖</div>
  <div class="assistant-panel" id="assistant-panel">
    <div class="assistant-header">
      <h3>🤖 Study Assistant</h3>
      <div class="modal-close" onclick="toggleAssistant()">✕</div>
    </div>
    <div class="assistant-body" id="assistant-body"></div>
    <div class="assistant-footer">
      <input type="text" id="assistant-input" placeholder="Ask me anything..." />
      <button class="voice-btn" id="voice-btn" onclick="toggleVoice()">🎤</button>
      <button class="send-btn" onclick="sendAssistantMessage()">➤</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/api.js"></script>
  <script src="js/logs.js"></script>
  <script src="js/assistant.js"></script>
  <script>
    function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); }
  </script>
</body>
</html>
